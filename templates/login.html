<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Viver de Obra</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root { --principal: #BEA890; --escuro: #232728; --dourado: #C3A17C; }
    body { background: #F9F4F8; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-card { width: 100%; max-width: 400px; border: none; border-radius: 16px; box-shadow: 0 8px 32px rgba(35,39,40,.14); }
    .login-header { background: var(--escuro); border-radius: 16px 16px 0 0; padding: 2rem; text-align: center; color: #fff; }
    .login-header .logo-icon { font-size: 2.5rem; color: var(--principal); }
    .btn-login { background: var(--principal); border-color: var(--principal); color: #fff; font-weight: 600; }
    .btn-login:hover { background: var(--dourado); border-color: var(--dourado); color: #fff; }
    .form-control:focus { border-color: var(--principal); box-shadow: 0 0 0 .2rem rgba(190,168,144,.25); }
  </style>
</head>
<body>
<div class="login-card card">
  <div class="login-header">
    <div class="logo-icon"><i class="bi bi-building"></i></div>
    <h4 class="fw-bold mt-2 mb-0">Viver de Obra</h4>
    <p class="small opacity-75 mb-0">Gestão de Contratos</p>
  </div>
  <div class="card-body p-4">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="alert alert-{{ cat }} py-2">{{ msg }}</div>
      {% endfor %}
    {% endwith %}
    <form method="post">
      <div class="mb-3">
        <label class="form-label fw-semibold">Usuário</label>
        <input type="text" name="login" class="form-control" placeholder="login" autofocus required>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">Senha</label>
        <input type="password" name="senha" class="form-control" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-login w-100">
        <i class="bi bi-box-arrow-in-right me-2"></i>Entrar
      </button>
    </form>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
